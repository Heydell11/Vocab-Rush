<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBVr-eOfbZ7VyS1BNdMWcgxFy5cA5G8Iqc",
  authDomain: "vocab-rush-e19d8.firebaseapp.com",
  projectId: "vocab-rush-e19d8",
  storageBucket: "vocab-rush-e19d8.firebasestorage.app",
  messagingSenderId: "313243244560",
  appId: "1:313243244560:web:3a63dba214a2435965d295"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const auth = getAuth(fbApp);

function keyToDocId(key) { return key.replace(/[^a-zA-Z0-9_-]/g, "_"); }

async function dbGet(key, shared) {
  try {
    const col = shared ? "shared" : "personal";
    const ref = doc(db, col, keyToDocId(key));
    const snap = await getDoc(ref);
    if (!snap.exists()) return null;
    return JSON.parse(snap.data().value);
  } catch (e) { console.error("dbGet error:", key, e); return null; }
}

async function dbSet(key, value, shared) {
  try {
    const col = shared ? "shared" : "personal";
    const ref = doc(db, col, keyToDocId(key));
    await setDoc(ref, { value: JSON.stringify(value) });
    return true;
  } catch (e) { console.error("dbSet error:", key, e); return false; }
}

// 管理者専用ドキュメント(vocab-words / play-password / student-ids)への書き込み。
// Firestoreルール側で _adminAuth ハッシュの一致を要求しているため、
// 通常の dbSet ではなくこちらを使う。
async function dbSetAdmin(key, value, adminHash) {
  try {
    const ref = doc(db, "shared", keyToDocId(key));
    await setDoc(ref, { value: JSON.stringify(value), _adminAuth: adminHash });
    return true;
  } catch (e) { console.error("dbSetAdmin error:", key, e); return false; }
}

signInAnonymously(auth).catch(e => console.error("Auth error:", e));

// grab everything we need onto window so the non-module script below can use it
window.__fb = { dbGet, dbSet, dbSetAdmin };

auth.onAuthStateChanged(function(user) {
  if (user) {
    window.__fbReady = true;
    window.dispatchEvent(new Event('fb-ready'));
  }
});
</script>

var ADMIN_PASSWORD_HASH = '7d6fff6eec25cc5960ddc4e18101d02dad345db5eaf6210755826ef965450810';

var LEVELS = ['中1','中2','中3','卒業'];

var state = {
  allWords: DEFAULT_WORDS,

};

function $(id) { return document.getElementById(id); }

async function sha256(str) {
  var enc = new TextEncoder().encode(str);
  var buf = await crypto.subtle.digest('SHA-256', enc);
  var arr = Array.from(new Uint8Array(buf));
  return arr.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
}

// Stage 3-1: 統計トラッキング基盤。
// 旧プロフィール(stats未保持)にも後付けで初期化する。
function ensureStats(profile) {
  if (!profile.stats) {
    profile.stats = {
      totalScore: profile.totalScore || 0,
      bestAccuracy: 0,
      bestCombo: 0,
      exactScoresSeen: [],
      earlyBird: false,
      nightOwl: false,
      levelsPlayed: [],
      comeback: false,
      practiceCount: 0,
      practiceCorrect: 0,
      mistakesResolved: 0
    };
  }
  return profile.stats;
}

function showScreen(id) {
  var screens = document.querySelectorAll('[id^="screen-"]');
  for (var i = 0; i < screens.length; i++) screens[i].classList.add('hidden');
  var target = $(id);
  if (target) target.classList.remove('hidden');
}

function getMonthKey() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

function getCurrentYearOptions() {
  var y = new Date().getFullYear();
  var years = [];
  for (var i = y + 1; i >= y - 3; i--) years.push(i);
  return years;
}

/* ---------- データ読み込み ---------- */
async function loadAllData() {
  var words = await window.__fb.dbGet('vocab-words', true);
  if (words && Array.isArray(words) && words.length) state.allWords = words;

  var pw = await window.__fb.dbGet('play-password', true);
  if (pw) state.playPassword = pw;

  var ids = await window.__fb.dbGet('student-ids', true);
  if (ids && Array.isArray(ids)) state.studentIds = ids;

  var ranks = await window.__fb.dbGet('rankings', true);
  if (ranks) state.rankings = ranks;
}

/* ---------- 初期化 ---------- */
async function initApp() {
  await loadAllData();
  populateYearSelects();
  populateFaceOptions();
  populateAdminLevelSelect();
  showScreen('screen-home');
}

function populateYearSelects() {
  var years = getCurrentYearOptions();
  var setupSel = $('input-setup-year');
  var issueSel = $('admin-issue-year');
  setupSel.innerHTML = '';
  issueSel.innerHTML = '';
  years.forEach(function(y) {
    var o1 = document.createElement('option');
    o1.value = y; o1.textContent = y + '年度';
    setupSel.appendChild(o1);
    var o2 = document.createElement('option');
    o2.value = y; o2.textContent = y + '年度';
    issueSel.appendChild(o2);
  });
}

function populateFaceOptions() {
  var box = $('face-options');
  box.innerHTML = '';
  FACE_OPTIONS.forEach(function(f) {
    var btn = document.createElement('button');
    btn.textContent = f;
    btn.className = 'btn';
    btn.style.fontSize = '28px';
    btn.style.padding = '10px';
    btn.style.background = (f === state.setupFace) ? '#8b5cf6' : '#1e293b';
    btn.onclick = function() {
      state.setupFace = f;
      populateFaceOptions();
    };
    box.appendChild(btn);
  });
}

function populateAdminLevelSelect() {
  var sel = $('admin-level-select');
  sel.innerHTML = '';
  LEVELS.forEach(function(lv) {
    var o = document.createElement('option');
    o.value = lv; o.textContent = lv;
    sel.appendChild(o);
  });
  sel.onchange = renderAdminWordList;
  renderAdminWordList();
}

async function submitStudentId() {
  var val = $('input-studentid').value.trim().toUpperCase();
  if (!val) return;
  if (state.studentIds.indexOf(val) === -1) {
    $('error-studentid').textContent = 'そのIDは登録されていません';
    return;
  }
  state.studentId = val;
  showScreen('screen-loading');

  var profile = await window.__fb.dbGet('profile-' + val, true);
  if (profile) {
    ensureStats(profile);
    state.profile = profile;
    goLevelSelect();
  } else {
    $('profilesetup-id').textContent = 'ID: ' + val;
    state.setupFace = FACE_OPTIONS[0];
    populateFaceOptions();
    showScreen('screen-profilesetup');
  }
}

async function confirmProfileSetup() {
  var name = $('input-setup-name').value.trim();
  if (!name) return;
  var year = parseInt($('input-setup-year').value, 10);
  var profile = {
    studentId: state.studentId,
    name: name,
    enrollYear: year,
    face: state.setupFace,
    totalScore: 0
  };
  ensureStats(profile);
  state.profile = profile;
  await window.__fb.dbSet('profile-' + state.studentId, profile, true);
  goLevelSelect();
}

/* ---------- ゲームロジック ---------- */
function startGameForLevel(level) {
  state.selectedLevel = level;
  var countdown = 3;
  $('countdown-num').textContent = countdown;
  showScreen('screen-countdown');
  var timer = setInterval(function() {
    countdown -= 1;
    if (countdown <= 0) {
      clearInterval(timer);
      beginGame();
    } else {
      $('countdown-num').textContent = countdown;
    }
  }, 700);
}

function shuffleArray(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function beginGame() {
  var pool = state.allWords.filter(function(w) { return w.level === state.selectedLevel; });
  if (pool.length === 0) pool = DEFAULT_WORDS.filter(function(w) { return w.level === state.selectedLevel; });
  var shuffled = shuffleArray(pool);

  state.game = {
    queue: shuffled,
    index: 0,
    score: 0,
    correct: 0,
    attempted: 0,
    combo: 0,
    maxCombo: 0,
    hadMistake: false,
    timeLeft: 60,
    timerId: null
  };

  $('game-score').textContent = '0';
  $('game-time').textContent = '60';
  $('game-correct').textContent = '0';
  $('game-attempted').textContent = '0';
  $('game-input').value = '';
  showCurrentWord();
  showScreen('screen-game');
  $('game-input').focus();

  state.game.timerId = setInterval(gameTick, 1000);
}

function showCurrentWord() {
  var g = state.game;
  if (!g) return;
  if (g.index >= g.queue.length) {
    g.queue = g.queue.concat(shuffleArray(g.queue));
  }
  var word = g.queue[g.index];
  $('game-japanese').textContent = word ? word.japanese : '';
}

function gameTick() {
  var g = state.game;
  if (!g) return;
  g.timeLeft -= 1;
  $('game-time').textContent = g.timeLeft;
  if (g.timeLeft <= 0) {
    clearInterval(g.timerId);
    endGame();
  }
}

function getComboMultiplier(c) {
  if (c >= 10) return 3;
  if (c >= 5) return 2;
  if (c >= 3) return 1.5;
  return 1;
}

function submitGameAnswer() {
  var g = state.game;
  if (!g) return;
  var input = $('game-input').value.trim();
  if (!input) return;
  var word = g.queue[g.index];
  if (!word) return;

  g.attempted += 1;
  var correct = input.toLowerCase() === word.english.toLowerCase();

  var box = $('game-word-box');
  if (correct) {
    g.combo += 1;
    var mult = getComboMultiplier(g.combo);
    var pts = Math.round(10 * mult);
    g.score += pts;
    g.correct += 1;
    g.maxCombo = Math.max(g.maxCombo, g.combo);
    box.style.background = '#052e1a';
  } else {
    g.combo = 0;
    g.hadMistake = true;
    box.style.background = '#450a0a';
  }

  $('game-score').textContent = g.score;
  $('game-correct').textContent = g.correct;
  $('game-attempted').textContent = g.attempted;
  $('game-input').value = '';

  g.index += 1;

  setTimeout(function() {
    box.style.background = '#0f172a';
    if (state.game) {
      showCurrentWord();
      $('game-input').focus();
    }
  }, 300);
}

function abandonGame() {
  if (state.game && state.game.timerId) clearInterval(state.game.timerId);
  state.game = null;
  goHome();
}

async function endGame() {
  var g = state.game;
  if (!g) return;
  var accuracy = g.attempted > 0 ? Math.round((g.correct / g.attempted) * 100) : 0;

  $('result-score').textContent = g.score;
  $('result-correct').textContent = g.correct + ' / ' + g.attempted;
  $('result-combo').textContent = g.maxCombo;
  $('result-accuracy').textContent = accuracy + '%';

  // ランキング保存
  var level = state.selectedLevel;
  var mk = getMonthKey();
  if (!state.rankings[level]) state.rankings[level] = { monthly: [], monthKey: mk };
  if (state.rankings[level].monthKey !== mk) {
    state.rankings[level].monthly = [];
    state.rankings[level].monthKey = mk;
  }
  var entry = {
    studentId: state.studentId,
    name: state.profile ? state.profile.name : state.studentId,
    score: g.score,
    correct: g.correct,
    attempted: g.attempted,
    accuracy: accuracy,
    maxCombo: g.maxCombo,
    date: new Date().toISOString()
  };
  state.rankings[level].monthly = state.rankings[level].monthly
    .filter(function(e) { return e.studentId !== entry.studentId; })
    .concat(entry)
    .sort(function(a, b) { return b.score - a.score; })
    .slice(0, 20);

  await window.__fb.dbSet('rankings', state.rankings, true);

  if (state.profile) {
    var stats = ensureStats(state.profile);
    var now = new Date();
    var hour = now.getHours();

    stats.bestAccuracy = Math.max(stats.bestAccuracy, accuracy);
    stats.bestCombo = Math.max(stats.bestCombo, g.maxCombo);
    if (g.score === 777 && stats.exactScoresSeen.indexOf(777) === -1) {
      stats.exactScoresSeen.push(777);
    }
    if (hour >= 6 && hour < 8) stats.earlyBird = true;
    if (hour >= 23) stats.nightOwl = true;
    if (stats.levelsPlayed.indexOf(level) === -1) stats.levelsPlayed.push(level);
    if (g.hadMistake && g.maxCombo >= 20) stats.comeback = true;

    state.profile.totalScore = (state.profile.totalScore || 0) + g.score;
    stats.totalScore = state.profile.totalScore;
    await window.__fb.dbSet('profile-' + state.studentId, state.profile, true);
  }

  state.game = null;
  showScreen('screen-result');
}

/* ---------- ランキング表示 ---------- */
function setRankingLevel(level) {
  state.rankingLevel = level;
  var tabs = document.querySelectorAll('#ranking-level-tabs .tab-btn');
  tabs.forEach(function(t) {
    t.classList.toggle('active', t.getAttribute('data-level') === level);
  });
  renderRankingList();
}

function renderRankingList() {
  var listEl = $('ranking-list');
  var data = state.rankings[state.rankingLevel];
  var monthly = (data && data.monthly) ? data.monthly : [];
  if (monthly.length === 0) {
    listEl.innerHTML = '<p style="text-align:center; color:#94a3b8;">まだ記録がありません</p>';
    return;
  }
  var html = '';
  monthly.forEach(function(entry, i) {
    html += '<div class="ranking-item">' +
      '<span class="rank-num">#' + (i + 1) + '</span>' +
      '<div style="flex:1; padding:0 10px;">' +
        '<div style="font-weight:bold;">' + escapeHtml(entry.name) + '</div>' +
        '<div style="font-size:11px; color:#94a3b8;">正答率 ' + entry.accuracy + '%　最大コンボ ' + entry.maxCombo + '</div>' +
      '</div>' +
      '<span class="score-val">' + entry.score + '</span>' +
    '</div>';
  });
  listEl.innerHTML = html;
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ---------- 管理者 ---------- */
async function submitAdminPassword() {
  var val = $('input-adminpw').value;
  var hash = await sha256(val);
  if (hash === ADMIN_PASSWORD_HASH) {
    state.adminAuthHash = hash;
    goAdminPanel();
  } else {
    $('error-adminpw').textContent = 'パスワードが正しくありません';
  }
}

function renderAdminWordList() {
  var level = $('admin-level-select').value;
  var words = state.allWords.filter(function(w) { return w.level === level; });
  var listEl = $('admin-word-list');
  if (words.length === 0) {
    listEl.innerHTML = '<p style="color:#94a3b8; text-align:center; margin:0;">単語がありません</p>';
    return;
  }
  var html = '';
  words.forEach(function(w) {
    html += '<div style="display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #334155;">' +
      '<span>' + escapeHtml(w.english) + ' - ' + escapeHtml(w.japanese) + '</span>' +
      '<button class="admin-delete-word-btn" data-english="' + escapeHtml(w.english) + '" data-level="' + escapeHtml(w.level) + '" style="background:none; border:none; color:#f87171; cursor:pointer; font-size:13px;">削除</button>' +
    '</div>';
  });
  listEl.innerHTML = html;

  var delBtns = listEl.querySelectorAll('.admin-delete-word-btn');
  delBtns.forEach(function(btn) {
    btn.onclick = function() {
      var eng = btn.getAttribute('data-english');
      var lvl = btn.getAttribute('data-level');
      deleteWord(eng, lvl);
    };
  });
}

async function addWord() {
  var eng = $('admin-word-en').value.trim();
  var jpn = $('admin-word-jp').value.trim();
  var level = $('admin-level-select').value;
  if (!eng || !jpn) return;
  state.allWords.push({ english: eng, japanese: jpn, level: level });
  await window.__fb.dbSetAdmin('vocab-words', state.allWords, state.adminAuthHash);
  $('admin-word-en').value = '';
  $('admin-word-jp').value = '';
  renderAdminWordList();
}

async function deleteWord(eng, level) {
  state.allWords = state.allWords.filter(function(w) {
    return !(w.english === eng && w.level === level);
  });
  await window.__fb.dbSetAdmin('vocab-words', state.allWords, state.adminAuthHash);
  renderAdminWordList();
}

function generateRandomId() {
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var id = '';
  for (var i = 0; i < 8; i++) id += chars[Math.floor(Math.random() * chars.length)];
  return id;
}

async function issueStudentIds() {
  var count = parseInt($('admin-issue-count').value, 10) || 1;
  count = Math.max(1, Math.min(100, count));
  var existing = {};
  state.studentIds.forEach(function(id) { existing[id] = true; });
  var newIds = [];
  while (newIds.length < count) {
    var id = generateRandomId();
    if (existing[id]) continue;
    existing[id] = true;
    newIds.push(id);
    state.studentIds.push(id);
  }
  await window.__fb.dbSetAdmin('student-ids', state.studentIds, state.adminAuthHash);
  $('admin-issued-list').innerHTML = '<strong>発行したID:</strong><br>' + newIds.join('<br>');
}

async function saveAdminPlayPassword() {
  var pw = $('admin-playpw-input').value.trim();
  if (!pw) return;
  state.playPassword = pw;
  await window.__fb.dbSetAdmin('play-password', pw, state.adminAuthHash);
  $('admin-playpw-input').value = '';
  var msg = $('admin-save-msg');
  msg.textContent = '保存しました！';
  setTimeout(function() { msg.textContent = ''; }, 2000);
}

/* ---------- イベントリスナー登録 ---------- */
function wireUpEvents() {
  $('btn-battle-start').onclick = goPlayPasswordGate;
  $('btn-show-ranking').onclick = goRanking;
  $('btn-admin-login').onclick = goAdminLogin;

  $('btn-playpw-submit').onclick = submitPlayPassword;
  $('btn-playpw-back').onclick = goHome;
  $('input-playpw').onkeydown = function(e) { if (e.key === 'Enter') submitPlayPassword(); };

  $('btn-studentid-submit').onclick = submitStudentId;
  $('btn-studentid-back').onclick = goHome;
  $('input-studentid').onkeydown = function(e) { if (e.key === 'Enter') submitStudentId(); };

  $('btn-profilesetup-confirm').onclick = confirmProfileSetup;

  var levelBtns = document.querySelectorAll('.level-btn');
  levelBtns.forEach(function(btn) {
    btn.onclick = function() { startGameForLevel(btn.getAttribute('data-level')); };
  });
  $('btn-levelselect-back').onclick = goHome;

  $('btn-game-submit').onclick = submitGameAnswer;
  $('game-input').onkeydown = function(e) { if (e.key === 'Enter') submitGameAnswer(); };
  $('btn-game-abandon').onclick = abandonGame;

  $('btn-result-retry').onclick = goLevelSelect;
  $('btn-result-ranking').onclick = goRanking;
  $('btn-result-home').onclick = goHome;

  var rankTabs = document.querySelectorAll('#ranking-level-tabs .tab-btn');
  rankTabs.forEach(function(tab) {
    tab.onclick = function() { setRankingLevel(tab.getAttribute('data-level')); };
  });
  $('btn-ranking-back').onclick = goHome;

  $('btn-adminlogin-submit').onclick = submitAdminPassword;
  $('btn-adminlogin-back').onclick = goHome;
  $('input-adminpw').onkeydown = function(e) { if (e.key === 'Enter') submitAdminPassword(); };

  $('btn-admin-add-word').onclick = addWord;
  $('btn-admin-issue-ids').onclick = issueStudentIds;
  $('btn-admin-save-playpw').onclick = saveAdminPlayPassword;
  $('btn-adminpanel-home').onclick = goHome;
}

/* ---------- 起動 ---------- */
function boot() {
  wireUpEvents();
  if (window.__fbReady) {
    initApp();
  } else {
    window.addEventListener('fb-ready', initApp, { once: true });
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}
</script>
