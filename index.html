<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, getDocs }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, signInAnonymously }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBVr-eOfbZ7VyS1BNdMWcgxFy5cA5G8Iqc",
    authDomain: "vocab-rush-e19d8.firebaseapp.com",
    projectId: "vocab-rush-e19d8",
    storageBucket: "vocab-rush-e19d8.firebasestorage.app",
    messagingSenderId: "313243244560",
    appId: "1:313243244560:web:3a63dba214a2435965d295"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const auth = getAuth(app);

  // 匿名ログイン（生徒用）
  signInAnonymously(auth).catch(e => console.error("Auth error:", e));

  // window.storage の代替 ─ Firestore をラップ
  // shared=true  → コレクション "shared"  / ドキュメントID = key
  // shared=false → コレクション "personal" / ドキュメントID = key
  window._db = db;
  window.storage = {
    async get(key, shared = false) {
      try {
        const col = shared ? "shared" : "personal";
        const ref = doc(db, col, key.replace(/[:/]/g, "_"));
        const snap = await getDoc(ref);
        if (!snap.exists()) return null;
        return { key, value: snap.data().value, shared };
      } catch (e) { console.error("storage.get", e); return null; }
    },
    async set(key, value, shared = false) {
      try {
        const col = shared ? "shared" : "personal";
        const ref = doc(db, col, key.replace(/[:/]/g, "_"));
        await setDoc(ref, { value, updatedAt: Date.now() });
        return { key, value, shared };
      } catch (e) { console.error("storage.set", e); return null; }
    },
    async delete(key, shared = false) {
      try {
        const col = shared ? "shared" : "personal";
        const ref = doc(db, col, key.replace(/[:/]/g, "_"));
        await deleteDoc(ref);
        return { key, deleted: true, shared };
      } catch (e) { console.error("storage.delete", e); return null; }
    },
    async list(prefix = "", shared = false) {
      try {
        const col = shared ? "shared" : "personal";
        const snap = await getDocs(collection(db, col));
        const safePrefix = prefix.replace(/[:/]/g, "_");
        const keys = snap.docs
          .map(d => d.id)
          .filter(id => id.startsWith(safePrefix));
        return { keys, prefix, shared };
      } catch (e) { console.error("storage.list", e); return null; }
    }
  };

  // Firebaseの準備が整ってからReactを起動
  window._firebaseReady = true;
  document.dispatchEvent(new Event("firebase-ready"));
</script>

const shuffle = arr => { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };
const getMonthKey = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; };
const getWeekKey = () => { const d=new Date(),oj=new Date(d.getFullYear(),0,1),w=Math.ceil((((d-oj)/86400000)+oj.getDay()+1)/7); return `${d.getFullYear()}-W${w}`; };
const getTodayKey = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const emptyRankings = () => { const o={}; LEVELS.forEach(lv=>{o[lv.key]={monthly:[],allTime:[],monthKey:getMonthKey()};}); return o; };
const getComboMultiplier = c => c>=10?3:c>=5?2:c>=3?1.5:1;
const getRankForPoints = pts => { let cur=RANKS[0]; for(const r of RANKS) if(pts>=r.threshold) cur=r; return cur; };
const getDaysUntilMonthEnd = () => { const n=new Date(),l=new Date(n.getFullYear(),n.getMonth()+1,0); return Math.max(0,Math.ceil((l-n)/(1000*60*60*24))); };
const isMaintenanceActive = mw => { if(!mw||!mw.enabled) return false; const n=new Date(); return n>=new Date(mw.startTime)&&n<=new Date(mw.endTime); };
const calcRankPoints = (s,a,c) => Math.round(s*0.6+(a>=50?(a-50)*2:0)+c*3);
const getCurrentYearOptions = () => { const n=new Date().getFullYear(); const ys=[]; for(let y=n+1;y>=n-6;y--) ys.push(y); return ys; };
const generateRandomId = (len=8) => { const ch='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let id=''; for(let i=0;i<len;i++) id+=ch[Math.floor(Math.random()*ch.length)]; return id; };

const formatRankDate = mk => { if(!mk) return ''; const[y,m]=mk.split('-'); return `(${y.slice(2)},${MONTH_NAMES[parseInt(m,10)-1]})`; };

function getEarnedRewardFaceKeys(stats={}) {
  const normalFaces = REWARD_FACES.filter(rf => rf.cond !== 'allRewardFaces');
  const earnedNormal = normalFaces.filter(rf => {
    switch(rf.cond){
      case 'score':          return (stats.totalScore||0)>=rf.threshold;
      case 'combo':          return (stats.bestCombo||0)>=rf.threshold;
      case 'accuracy':       return (stats.bestAccuracy||0)>=rf.threshold;
      case 'allLevels':      return (stats.levelsPlayed||[]).length>=4;
      case 'streak':         return (stats.bestStreakDays||0)>=rf.threshold;
      case 'practiceCount':  return (stats.practiceCount||0)>=rf.threshold;
      case 'practiceCorrect':return (stats.practiceCorrect||0)>=rf.threshold;
      case 'mistakesResolved':return (stats.mistakesResolved||0)>=rf.threshold;
      case 'exactScore':     return (stats.exactScoresSeen||[]).includes(rf.threshold);
      case 'earlyBird':      return !!stats.earlyBird;
      case 'nightOwl':       return !!stats.nightOwl;
      default: return false;
    }
  }).map(rf=>rf.key);
  const special = REWARD_FACES.find(rf=>rf.cond==='allRewardFaces');
  const result = [...earnedNormal];
  if (special && earnedNormal.length >= normalFaces.length) result.push(special.key);
  return result;
}
function getEarnedRewardColorKeys(stats={}) {
  const normalColors = REWARD_COLORS.filter(rc => rc.cond !== 'allRewardColors');
  const earnedNormal = normalColors.filter(rc => {
    switch(rc.cond){
      case 'score':          return (stats.totalScore||0)>=rc.threshold;
      case 'combo':          return (stats.bestCombo||0)>=rc.threshold;
      case 'streak':         return (stats.bestStreakDays||0)>=rc.threshold;
      case 'nightOwl':       return !!stats.nightOwl;
      case 'earlyBird':      return !!stats.earlyBird;
      case 'practiceCorrect':return (stats.practiceCorrect||0)>=rc.threshold;
      default: return false;
    }
  }).map(rc=>rc.key);
  const special = REWARD_COLORS.find(rc=>rc.cond==='allRewardColors');
  const result = [...earnedNormal];
  if (special && earnedNormal.length >= normalColors.length) result.push(special.key);
  return result;
}
function getEarnedTitleKeys(stats={}) {
  return TITLES.filter(t=>{
    switch(t.cond){
      case 'score':          return (stats.totalScore||0)>=t.threshold;
      case 'accuracy':       return (stats.bestAccuracy||0)>=t.threshold;
      case 'combo':          return (stats.bestCombo||0)>=t.threshold;
      case 'exactScore':     return (stats.exactScoresSeen||[]).includes(t.threshold);
      case 'exactAccuracy':  return (stats.exactAccuraciesSeen||[]).includes(t.threshold);
      case 'earlyBird':      return !!stats.earlyBird;

      case 'allLevels':      return (stats.levelsPlayed||[]).length>=4;
      case 'comeback':       return !!stats.comeback;
      case 'practiceCount':  return (stats.practiceCount||0)>=t.threshold;
      case 'practiceCorrect':return (stats.practiceCorrect||0)>=t.threshold;
      case 'mistakesResolved':return (stats.mistakesResolved||0)>=t.threshold;
      case 'streak':         return (stats.bestStreakDays||0)>=t.threshold;
      default: return false;
    }
  }).map(t=>t.key);
}
function getRankProgress(pts) {
  const idx=RANKS.findIndex(r=>r.key===getRankForPoints(pts).key);
  const cur=RANKS[idx],nxt=RANKS[idx+1];
  if(!nxt) return {current:cur,next:null,pct:100,remaining:0};
  const span=nxt.threshold-cur.threshold,prog=pts-cur.threshold;
  return {current:cur,next:nxt,pct:Math.min(100,Math.round(prog/span*100)),remaining:nxt.threshold-pts};
}
function getTierStyle(tier) {
  switch(tier){
    case 'bronze':  return {box:'bg-orange-900/40 border-orange-500',text:'text-orange-300',anim:'animate-pulse'};
    case 'silver':  return {box:'bg-slate-700/60 border-slate-300',  text:'text-slate-100',  anim:'animate-pulse'};
    case 'gold':    return {box:'bg-yellow-900/40 border-yellow-400',text:'text-yellow-300', anim:'animate-bounce'};
    case 'platinum':return {box:'bg-cyan-900/40 border-cyan-400',    text:'text-cyan-300',   anim:'animate-bounce'};
    case 'rainbow': return {box:'bg-gradient-to-r from-fuchsia-900/60 via-purple-900/60 to-yellow-900/60 border-fuchsia-400',text:'text-fuchsia-200',anim:'animate-bounce'};
    default:        return {box:'bg-gray-700/60 border-gray-500',    text:'text-gray-200',   anim:''};
  }
}
function condToDesc(t) {
  if(t.desc) return t.desc;
  switch(t.cond){
    case 'score':           return `累計${t.threshold}pt達成`;
    case 'accuracy':        return `1プレイで正答率${t.threshold}%以上`;
    case 'combo':           return `1プレイでコンボ${t.threshold}以上`;
    case 'practiceCount':   return `練習モードを${t.threshold}回プレイ`;
    case 'practiceCorrect': return `練習モードで累計${t.threshold}問正解`;
    case 'mistakesResolved':return `苦手単語を${t.threshold}個克服`;
    case 'streak':          return `${t.threshold}日連続ログイン`;
    default: return '';
  }
}

  return {

    stats:{totalScore:0,bestAccuracy:0,bestCombo:0,exactScoresSeen:[],exactAccuraciesSeen:[],
      earlyBird:false,nightOwl:false,levelsPlayed:[],comeback:false,
      practiceCount:0,practiceCorrect:0,mistakesResolved:0},
    earnedTitleKeys:[],displayedTitleKeys:['beginner'],
    unlockedRewardFaces:[],unlockedRewardColors:[],

function migrateProfile(raw, id) {
  const p={...defaultProfile(id),...raw};
  if(!p.displayedTitleKeys) p.displayedTitleKeys=[p.displayedTitleKey||'beginner'];
  p.unlockedRewardFaces = getEarnedRewardFaceKeys(p.stats||{});
  p.unlockedRewardColors = getEarnedRewardColorKeys(p.stats||{});
  const usedFaceReward = REWARD_FACES.find(rf=>rf.face===p.face);
  if(usedFaceReward && !p.unlockedRewardFaces.includes(usedFaceReward.key))
    p.unlockedRewardFaces=[...p.unlockedRewardFaces, usedFaceReward.key];
  const usedColorReward = REWARD_COLORS.find(rc=>rc.key===p.color);
  if(usedColorReward && !p.unlockedRewardColors.includes(usedColorReward.key))
    p.unlockedRewardColors=[...p.unlockedRewardColors, usedColorReward.key];
  return p;
}
function getDisplayedTitles(profile) {
  const earned = profile.isQA ? TITLES.map(t=>t.key) : (profile.earnedTitleKeys||['beginner']);
  return (profile.displayedTitleKeys||['beginner'])
    .filter(k=>earned.includes(k)).map(k=>TITLES.find(t=>t.key===k)).filter(Boolean);
}
function getDisplayedRank(profile) {
  const key=profile.displayedRankKey||profile.bestRankKeyThisMonth||'beginner';
  return RANKS.find(r=>r.key===key)||RANKS[0];
}

let _clickMuted = false;
let _clickCtx = null;
function playMenuClickSound() {
  if (_clickMuted) return;
  try {
    if (!_clickCtx) { const AC=window.AudioContext||window.webkitAudioContext; if(!AC)return; _clickCtx=new AC(); }
    if (_clickCtx.state==='suspended') _clickCtx.resume().catch(()=>{});
    const osc=_clickCtx.createOscillator(), gain=_clickCtx.createGain();
    osc.type='square'; osc.frequency.value=1200;
    const s=_clickCtx.currentTime;
    gain.gain.setValueAtTime(0.0001,s); gain.gain.exponentialRampToValueAtTime(0.15,s+0.005); gain.gain.exponentialRampToValueAtTime(0.0001,s+0.05);
    osc.connect(gain); gain.connect(_clickCtx.destination); osc.start(s); osc.stop(s+0.08);
  } catch(e) {}
}

  function getCtx(){if(!audioCtxRef.current){const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return null;audioCtxRef.current=new AC();}if(audioCtxRef.current.state==='suspended')audioCtxRef.current.resume().catch(()=>{});return audioCtxRef.current;}
  function beep(f,d,tp,delay=0){if(muted)return;const ctx=getCtx();if(!ctx)return;try{const o=ctx.createOscillator(),g=ctx.createGain();o.type=tp;o.frequency.value=f;const s=ctx.currentTime+delay;g.gain.setValueAtTime(0.0001,s);g.gain.exponentialRampToValueAtTime(0.25,s+0.01);g.gain.exponentialRampToValueAtTime(0.0001,s+d);o.connect(g);g.connect(ctx.destination);o.start(s);o.stop(s+d+0.05);}catch(e){}}
  const playCorrectSound=()=>{beep(1567,0.06,'square',0);beep(2349,0.18,'square',0.05);beep(3000,0.05,'sine',0.05);};

  async function saveProfile(updated) {

    setRankingsByLevel(prev=>{
      const next={};
      LEVELS.forEach(lv=>{
        const cur=prev[lv.key]||{monthly:[],allTime:[],monthKey:getMonthKey()};
        if(updated.hiddenFromRanking){
          next[lv.key]={...cur,monthly:cur.monthly.filter(e=>e.studentId!==updated.studentId),allTime:cur.allTime.filter(e=>e.studentId!==updated.studentId)};
        } else {
          next[lv.key]={...cur,
            monthly:cur.monthly.map(e=>e.studentId===updated.studentId?{...e,face:updated.face,color:updated.color,titleKey:primaryTitleKey,rankKey}:e),
            allTime:cur.allTime.map(e=>e.studentId===updated.studentId?{...e,face:updated.face,color:updated.color,titleKey:primaryTitleKey,rankKey}:e)};
        }
      });
      window.storage.set('vocab-rankings',JSON.stringify(next),true).catch(()=>{});
      return next;
    });
  }

  function goToLevel(lk){setPracticeMode(false);setSelectedLevel(lk);setCountdown(3);setScreen('countdown');}

  function getWordPool(){
    if(practiceMode&&practiceSource==='mistakes'){const mw=(profile?.mistakes||[]).map(m=>({english:m.english,japanese:m.japanese,level:m.level}));return mw.length>0?mw:DEFAULT_WORDS_FLAT.filter(w=>w.level==='中1');}
    const pool=allWords.filter(w=>w.level===selectedLevel);return pool.length>0?pool:DEFAULT_WORDS_FLAT.filter(w=>w.level===selectedLevel);
  }
  function beginGame(){
    const p=getWordPool(),sh=shuffle(p);
    setCurrentWord(sh[0]);setQueue(sh.slice(1));
    scoreRef.current=0;correctCountRef.current=0;attemptedRef.current=0;maxComboRef.current=0;
    allMistakesClearedRef.current=false;
    setFinalScore(0);setCorrectCount(0);setAttempted(0);setCombo(0);setMaxCombo(0);
    setTimeLeft(GAME_DURATION);setInput('');setFeedback(null);setLastPoints(0);setLocked(false);
    setBonusFlash(false);setSessionMistakes([]);setComebackTriggered(false);setHadMistakeThisGame(false);
    setPracticeResolvedWords([]);setPaused(false);setNewlyUnlockedTitles([]);setNewlyUnlockedRewards([]);
    setScreen('playing');
  }
  function goNextWord(cq){
    if(allMistakesClearedRef.current){allMistakesClearedRef.current=false;endGame();return;}
    const pool=getWordPool();let q=cq;if(!q.length)q=shuffle(pool);
    setCurrentWord(q[0]);setQueue(q.slice(1));setInput('');setFeedback(null);setLocked(false);
  }
  function submitAnswer(){
    if(locked||!currentWord||!input.trim())return;
    const correct=input.trim().toLowerCase()===currentWord.english.trim().toLowerCase();
    attemptedRef.current+=1;setAttempted(a=>a+1);setLocked(true);
    if(correct){
      const nc=combo+1,mult=getComboMultiplier(nc),pts=Math.round(10*mult);
      scoreRef.current+=pts;correctCountRef.current+=1;maxComboRef.current=Math.max(maxComboRef.current,nc);
      setFinalScore(scoreRef.current);setCorrectCount(c=>c+1);setCombo(nc);setMaxCombo(m=>Math.max(m,nc));
      setLastPoints(pts);setFeedback('correct');
      if(practiceMode&&practiceSource==='mistakes'){
        const pool=profile?.mistakes||[];
        setPracticeResolvedWords(prev=>{
          const next=Array.from(new Set([...prev,currentWord.english]));
          if(next.length>=pool.length)allMistakesClearedRef.current=true;
          return next;
        });
      }
      if(hadMistakeThisGame&&nc>=20)setComebackTriggered(true);
      if(nc>0&&nc%5===0){const b=nc>=20?8:nc>=10?6:4;setTimeLeft(t=>t+b);setBonusFlash(true);setTimeout(()=>setBonusFlash(false),1200);playBonusTimeSound();}
      else if(nc===3)playComboSound();else playCorrectSound();
      setTimeout(()=>goNextWord(queue),350);
    } else {
      setCombo(0);setLastPoints(0);setFeedback('incorrect');setHadMistakeThisGame(true);playIncorrectSound();
      setSessionMistakes(prev=>{const ex=prev.find(m=>m.english===currentWord.english);if(ex)return prev.map(m=>m.english===currentWord.english?{...m,missedCount:m.missedCount+1}:m);return[...prev,{english:currentWord.english,japanese:currentWord.japanese,level:selectedLevel,missedCount:1}];});
      setTimeout(()=>goNextWord(queue),1400);
    }
  }
  function handleKeyDown(e){if(e.key==='Enter')submitAnswer();}
  function abandonGame(){setPaused(false);setScreen('home');}

  async function endGame(){
    const score=scoreRef.current,corr=correctCountRef.current,att=attemptedRef.current,mCom=maxComboRef.current;
    const acc=att>0?Math.round(corr/att*100):0,now=new Date();
    if(isMaintenanceActive(maintenanceWindow)){setScreen('home');return;}

    if(practiceMode){
      const ps=profile.stats||{};const rc=practiceResolvedWords.length;
      let mm=profile.mistakes||[];
      if(practiceSource==='mistakes'&&rc>0)mm=mm.filter(m=>!practiceResolvedWords.includes(m.english));
      const ns={...ps,practiceCount:(ps.practiceCount||0)+1,practiceCorrect:(ps.practiceCorrect||0)+corr,mistakesResolved:(ps.mistakesResolved||0)+(practiceSource==='mistakes'?rc:0)};
      const prevKeys=profile.earnedTitleKeys||['beginner'],newKeys=getEarnedTitleKeys(ns);
      const ul=TITLES.filter(t=>newKeys.includes(t.key)&&!prevKeys.includes(t.key));
      setNewlyUnlockedTitles(ul);if(ul.length>0)setTimeout(()=>playUnlockSound(),500);
      await saveProfile({...profile,mistakes:mm,stats:ns,earnedTitleKeys:newKeys,unlockedRewardFaces:getEarnedRewardFaceKeys(ns),unlockedRewardColors:getEarnedRewardColorKeys(ns)});
      setLastRank(null);setLastRankPointsGained(0);setLastDailyBonusGained(0);setScreen('result');return;
    }

    const hour=now.getHours(),level=selectedLevel,mk=getMonthKey(),wk=getWeekKey();
    const ps=profile.stats||{};const pt=ps.totalScore||0;
    const ns={totalScore:pt+score,bestAccuracy:Math.max(ps.bestAccuracy||0,acc),bestCombo:Math.max(ps.bestCombo||0,mCom),
      exactScoresSeen:Array.from(new Set([...(ps.exactScoresSeen||[]),score])),
      exactAccuraciesSeen:Array.from(new Set([...(ps.exactAccuraciesSeen||[]),acc])),
      earlyBird:ps.earlyBird||(hour>=6&&hour<8),nightOwl:ps.nightOwl||(hour>=23||hour<1),
      levelsPlayed:Array.from(new Set([...(ps.levelsPlayed||[]),level])),comeback:ps.comeback||comebackTriggered,
      practiceCount:ps.practiceCount||0,practiceCorrect:ps.practiceCorrect||0,mistakesResolved:ps.mistakesResolved||0};
    const newRFaceKeys=getEarnedRewardFaceKeys(ns),newRColorKeys=getEarnedRewardColorKeys(ns);
    const prevRF=profile.unlockedRewardFaces||[],prevRC=profile.unlockedRewardColors||[];
    const newUnlockedFaces=newRFaceKeys.filter(k=>!prevRF.includes(k));
    const newUnlockedColors=newRColorKeys.filter(k=>!prevRC.includes(k));
    const newRewards=[...newUnlockedFaces.map(k=>({type:'face',...REWARD_FACES.find(f=>f.key===k)})),...newUnlockedColors.map(k=>({type:'color',...REWARD_COLORS.find(c=>c.key===k)}))];
    if(newRewards.length>0){setNewlyUnlockedRewards(newRewards);setTimeout(()=>playUnlockSound(),700);}

    const prevKeys=profile.earnedTitleKeys||['beginner'],newKeys=getEarnedTitleKeys(ns);
    const ul=TITLES.filter(t=>newKeys.includes(t.key)&&!prevKeys.includes(t.key));
    setNewlyUnlockedTitles(ul);if(ul.length>0)setTimeout(()=>playUnlockSound(),500);

    const carry=profile.weekKey===wk?(profile.weeklyRankPoints||0):0;
    const grp=calcRankPoints(score,acc,mCom),today=getTodayKey();
    const isFirst=profile.lastDailyPlayDate!==today,db=isFirst?DAILY_FIRST_PLAY_BONUS:0;
    if(isFirst){setDailyBonusNotice(DAILY_FIRST_PLAY_BONUS);setTimeout(()=>setDailyBonusNotice(null),4000);}
    const nwp=carry+grp+db,newRank=getRankForPoints(nwp);
    const prevBi=RANKS.findIndex(r=>r.key===(profile.monthKeyForRank===mk?(profile.bestRankKeyThisMonth||'beginner'):'beginner'));
    const newRi=RANKS.findIndex(r=>r.key===newRank.key);
    const bestRK=newRi>prevBi?newRank.key:(profile.monthKeyForRank===mk?(profile.bestRankKeyThisMonth||'beginner'):'beginner');
    const mm=[...(profile.mistakes||[])];
    sessionMistakes.forEach(sm=>{const idx=mm.findIndex(m=>m.english===sm.english);if(idx>=0)mm[idx]={...mm[idx],missedCount:(mm[idx].missedCount||0)+sm.missedCount,lastDate:now.toISOString(),resolved:false};else mm.push({...sm,lastDate:now.toISOString(),resolved:false});});

    const up={...profile,totalScore:pt+score,mistakes:mm,stats:ns,earnedTitleKeys:newKeys,
      unlockedRewardFaces:newRFaceKeys,unlockedRewardColors:newRColorKeys,
      weeklyRankPoints:nwp,weekKey:wk,bestRankKeyThisMonth:bestRK,monthKeyForRank:mk,
      displayedRankKey:profile.displayedRankKey&&RANKS.some(r=>r.key===profile.displayedRankKey)?profile.displayedRankKey:newRank.key,
      lastDailyPlayDate:today};
    await saveProfile(up);
    setLastRankPointsGained(grp+db);setLastDailyBonusGained(db);setLastRank(newRank);

    const primaryTitleKey=(up.displayedTitleKeys||['beginner'])[0];
    const entry={studentId:profile.studentId,name:profile.name||'名無し',score,correct:corr,attempted:att,accuracy:acc,maxCombo:mCom,
      face:up.face,color:up.color,titleKey:primaryTitleKey,rankKey:getDisplayedRank(up).key,monthKeyForRank:mk,date:now.toISOString()};
    setRankingsByLevel(prev=>{
      const cur=prev[level]||{monthly:[],allTime:[],monthKey:mk};
      const baseMonthly=(cur.monthKey===mk?cur.monthly:[]).filter(e=>e.studentId!==entry.studentId);
      const baseAllTime=cur.allTime.filter(e=>e.studentId!==entry.studentId);
      const monthly=(up.hiddenFromRanking?baseMonthly:baseMonthly.concat(entry)).sort((a,b)=>b.score-a.score).slice(0,20);
      const allTime=(up.hiddenFromRanking?baseAllTime:baseAllTime.concat(entry)).sort((a,b)=>b.score-a.score).slice(0,5);
      const updated={...prev,[level]:{monthly,allTime,monthKey:mk}};
      window.storage.set('vocab-rankings',JSON.stringify(updated),true).catch(()=>{});
      return updated;
    });
    setScreen('result');
  }

  async function confirmRestore(){
    if(!pendingRestoreFile)return;setRestoreStatus('復元中...');
    try{
      const text=await pendingRestoreFile.text();const backup=JSON.parse(text);
      if(!backup||typeof backup!=='object')throw new Error('invalid');
      if(Array.isArray(backup.words)){setAllWords(backup.words);await window.storage.set('vocab-words-flat',JSON.stringify(backup.words),true);}
      if(backup.rankings){setRankingsByLevel(backup.rankings);await window.storage.set('vocab-rankings',JSON.stringify(backup.rankings),true);}
      if(backup.playPassword){setPlayPassword(backup.playPassword);await window.storage.set('play-password',backup.playPassword,true);}
      if(Array.isArray(backup.studentIds)){setAllStudentIds(backup.studentIds);await window.storage.set('student-id-list',JSON.stringify(backup.studentIds),true);}
      if(backup.maintenanceWindow!==undefined){setMaintenanceWindow(backup.maintenanceWindow);await window.storage.set('maintenance-window',JSON.stringify(backup.maintenanceWindow),true);}
      if(Array.isArray(backup.announcements)){setAnnouncements(backup.announcements);await window.storage.set('announcements-list',JSON.stringify(backup.announcements),true);}
      let profileCount=0;
      if(backup.profiles&&typeof backup.profiles==='object'){
        for(const[id,prof]of Object.entries(backup.profiles)){await window.storage.set(`player-profile:${id}`,JSON.stringify(prof),true);profileCount++;}
      }
      setRestoreStatus(`復元が完了しました（生徒${profileCount}名分のデータを書き戻しました）`);
    }catch(err){setRestoreStatus('復元に失敗しました。正しいバックアップファイルかご確認ください。');}

  }

              <h2 className="text-2xl font-black">{profile.name}</h2>
              {practiceMode?(
                <div className="bg-slate-800/60 border border-white/10 rounded-xl p-5">
                  <p className="text-3xl font-black">{correctCount}/{attempted}</p>
                  <p className="text-xs text-white/40 uppercase tracking-wider">練習成績（スコア・ランクには反映されません）</p>
                  {practiceSource==='mistakes'&&practiceResolvedWords.length>0&&<p className="text-xs text-emerald-300 pt-2">🎉 {practiceResolvedWords.length}個の苦手単語を全問正解！</p>}
                </div>
              ):(
                <div className="bg-gradient-to-r from-fuchsia-900/40 to-cyan-900/40 border border-white/10 rounded-xl p-5">
                  <p className="text-5xl font-black" style={{textShadow:'0 0 20px rgba(217,70,239,0.5)'}}>{finalScore}</p>
                  <p className="text-xs text-white/40 uppercase tracking-wider">Final Score</p>
                </div>
              )}
              {!practiceMode&&lastRank&&<RpBreakdown score={finalScore} accuracy={accuracy} maxCombo={maxCombo} dailyBonus={lastDailyBonusGained}/>}
              <div className="grid grid-cols-3 gap-2">
                <div className="bg-slate-800/60 rounded-xl p-3 border border-white/5"><p className="text-xl font-black text-cyan-300">{correctCount}</p><p className="text-[10px] text-white/30 uppercase">Hits</p></div>
                <div className="bg-slate-800/60 rounded-xl p-3 border border-white/5"><p className="text-xl font-black text-orange-300">{maxCombo}</p><p className="text-[10px] text-white/30 uppercase">Max Combo</p></div>
                <div className="bg-slate-800/60 rounded-xl p-3 border border-white/5"><p className="text-xl font-black text-emerald-300">{accuracy}%</p><p className="text-[10px] text-white/30 uppercase">Accuracy</p></div>
              </div>
              {newlyUnlockedTitles.length>0&&(
                <div className="bg-yellow-950/40 border border-yellow-500/40 rounded-xl p-4 space-y-2">
                  <p className="font-black text-yellow-300 flex items-center justify-center gap-1 text-sm uppercase"><Sparkles className="w-4 h-4"/>NEW TITLE UNLOCKED!</p>
                  {newlyUnlockedTitles.map(t=><div key={t.key} className="flex justify-center"><TitleBadge title={t} size="md"/></div>)}
                </div>
              )}
              {newlyUnlockedRewards.length>0&&(
                <div className="bg-amber-950/40 border border-amber-500/40 rounded-xl p-4 space-y-2">
                  <p className="font-black text-amber-300 flex items-center justify-center gap-1 text-sm uppercase"><Star className="w-4 h-4"/>REWARD UNLOCKED!</p>
                  {newlyUnlockedRewards.map((r,i)=>(
                    <div key={i} className="flex items-center justify-center gap-2 text-sm">
                      <span className="text-2xl">{r.type==='face'?r.face:<span className={`inline-block w-6 h-6 rounded bg-gradient-to-br ${r.bg}`}></span>}</span>
                      <span className="text-amber-200 font-bold">{r.label}</span>
                      <span className="text-[10px] text-white/40">{r.desc}</span>
                    </div>
                  ))}
                  <p className="text-[10px] text-amber-300/60">マイページ→外見から使えます！</p>
                </div>
              )}
              <div className="grid grid-cols-2 gap-2">
                <NeonButton onClick={()=>{setCountdown(3);setScreen('countdown');}} icon={RotateCcw} variant="primary" className="py-3 text-xs">リトライ</NeonButton>
                <NeonButton onClick={()=>setScreen(practiceMode?'practiceSetup':'levelSelect')} icon={ArrowLeft} variant="dark" className="py-3 text-xs">{practiceMode?'練習を変更':'ティア変更'}</NeonButton>
                <NeonButton onClick={()=>setScreen('myCharacter')} icon={Sparkles} variant="cyan" className="py-3 text-xs">マイページ</NeonButton>
                {practiceMode?<NeonButton onClick={()=>setScreen('home')} icon={LogOut} variant="gold" className="py-3 text-xs">ホームへ</NeonButton>:<NeonButton onClick={()=>{setRankingLevel(selectedLevel);setRankingTab('monthly');setScreen('ranking');}} icon={Trophy} variant="gold" className="py-3 text-xs">ランキング</NeonButton>}
              </div>
              {!practiceMode&&<button onClick={()=>setScreen('home')} className="text-xs text-white/30 hover:text-white uppercase tracking-wide">ホームへ</button>}
            </div>
          )}

          {/* RANKING */}
          {screen==='ranking'&&(
            <div className="bg-slate-900/80 backdrop-blur border border-white/10 rounded-2xl p-6 space-y-4">
              <div className="flex items-center justify-between"><button onClick={()=>setScreen('home')} className="flex items-center gap-1 text-white/40 hover:text-white text-sm"><ArrowLeft className="w-4 h-4"/>戻る</button><h2 className="text-lg font-black uppercase flex items-center gap-1"><Crown className="w-5 h-5 text-yellow-400"/>LEADERBOARD</h2><div className="w-12"></div></div>
              <div className="grid grid-cols-4 gap-1">{LEVELS.map(lv=><button key={lv.key} onClick={()=>setRankingLevel(lv.key)} className={`text-xs font-black py-2 rounded-lg uppercase ${rankingLevel===lv.key?'bg-fuchsia-500 text-white':'bg-slate-800 text-white/40'}`}>{lv.key}</button>)}</div>
              <div className="flex gap-2">
                <button onClick={()=>setRankingTab('monthly')} className={`flex-1 py-2 rounded-lg text-xs font-black uppercase ${rankingTab==='monthly'?'bg-cyan-500 text-white':'bg-slate-800 text-white/40'}`}>Monthly Top20</button>
                <button onClick={()=>setRankingTab('allTime')}  className={`flex-1 py-2 rounded-lg text-xs font-black uppercase ${rankingTab==='allTime'?'bg-amber-500 text-white':'bg-slate-800 text-white/40'}`}>All-Time Top5</button>
              </div>
              <p className="text-[10px] text-white/30 text-center">※ 個人ベストスコアのみ掲載（リアルタイム反映）</p>
              {rankingList.length===0?<p className="text-center text-white/30 py-8 text-sm">まだ記録がありません</p>:(
                <div className="max-h-96 overflow-y-auto space-y-2">
                  {rankingList.map((r,i)=>{
                    const colorObj=getColorObj(r.color);
                    const entryTitle=TITLES.find(t=>t.key===r.titleKey);
                    const entryRank=RANKS.find(rk=>rk.key===r.rankKey);
                    return (
                      <div key={i} className={`rounded-xl p-3 border ${i===0?'bg-yellow-500/10 border-yellow-400/40':i===1?'bg-slate-300/10 border-slate-300/30':i===2?'bg-orange-500/10 border-orange-400/30':'bg-slate-800/40 border-white/5'}`}>
                        <div className="flex items-center gap-3">
                          <div className={`w-8 h-8 rounded-lg flex items-center justify-center font-black text-sm flex-shrink-0 ${i===0?'bg-yellow-400 text-black':i===1?'bg-slate-300 text-black':i===2?'bg-orange-400 text-black':'bg-slate-700 text-white/60'}`}>{i+1}</div>
                          <div className={`w-10 h-10 rounded-lg bg-gradient-to-br ${colorObj.bg} flex items-center justify-center text-xl flex-shrink-0 shadow`}>{r.face||'🐶'}</div>
                          <div className="flex-1 min-w-0"><p className="font-black truncate">{r.name}</p><p className="text-[10px] text-white/30">{new Date(r.date).toLocaleDateString('ja-JP')}　COMBO{r.maxCombo??0}</p></div>
                          <div className="text-right flex-shrink-0"><p className="font-black text-cyan-300">{r.score}</p><p className="text-[10px] text-white/30">ACC {r.accuracy}%</p></div>
                        </div>
                        {(entryTitle||entryRank)&&(
                          <div className="flex items-center gap-1 mt-2 ml-11 flex-wrap">
                            {entryTitle&&<TitleBadge title={entryTitle} size="sm"/>}
                            {entryRank&&<RankBadge rank={entryRank} monthKey={r.monthKeyForRank} size="sm"/>}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {/* ADMIN LOGIN */}
          {screen==='adminLogin'&&(
            <div className="bg-slate-900/80 backdrop-blur border border-white/10 rounded-2xl p-8 space-y-5">
              <button onClick={()=>setScreen('home')} className="flex items-center gap-1 text-white/40 hover:text-white text-sm"><ArrowLeft className="w-4 h-4"/>戻る</button>
              <div className="text-center space-y-2"><Lock className="w-10 h-10 text-fuchsia-400 mx-auto"/><h2 className="text-xl font-black uppercase">ADMIN LOGIN</h2></div>
              <input type="password" value={adminPasswordInput} onChange={e=>setAdminPasswordInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')handleAdminLogin();}} placeholder="パスワード" className="w-full text-center text-lg bg-slate-800 border-2 border-white/10 focus:border-fuchsia-400 rounded-xl px-4 py-3 outline-none text-white placeholder-white/30"/>
              {adminError&&<p className="text-red-400 text-sm text-center">{adminError}</p>}
              <NeonButton onClick={handleAdminLogin} icon={Lock} variant="primary" className="py-4 text-lg">ログイン</NeonButton>
            </div>
          )}

          {/* ADMIN PANEL */}
          {screen==='adminPanel'&&(
            <div className="bg-slate-900/80 backdrop-blur border border-white/10 rounded-2xl p-6 space-y-5 text-sm">
              <div className="flex items-center justify-between"><h2 className="text-lg font-black uppercase flex items-center gap-1"><Settings className="w-5 h-5"/>Admin Panel</h2><button onClick={()=>setScreen('home')} className="flex items-center gap-1 text-white/40 hover:text-white text-sm"><LogOut className="w-4 h-4"/>終了</button></div>
              <div className="bg-slate-800/60 border border-white/10 rounded-xl p-4 space-y-3">
                <SectionLabel color="red">メンテナンス予約</SectionLabel>
                {maintenanceWindow?.enabled&&<div className={`rounded-lg p-3 border text-xs ${isMaintenanceActive(maintenanceWindow)?'bg-red-950/40 border-red-500/40 text-red-300':'bg-amber-950/30 border-amber-500/30 text-amber-300'}`}><p className="font-bold">{isMaintenanceActive(maintenanceWindow)?'現在メンテナンス中':'予約済み'}</p><p className="text-white/50 mt-1">{new Date(maintenanceWindow.startTime).toLocaleString('ja-JP')} 〜 {new Date(maintenanceWindow.endTime).toLocaleString('ja-JP')}</p><button onClick={cancelMaintenanceWindow} className="mt-2 text-[11px] bg-slate-700 text-white rounded-lg px-2 py-1">予約を解除</button></div>}
                <div className="grid grid-cols-2 gap-2"><div><p className="text-[10px] text-white/40 mb-1">開始</p><input type="datetime-local" value={maintStartInput} onChange={e=>setMaintStartInput(e.target.value)} className="w-full bg-slate-900 border border-white/10 rounded-lg px-2 py-2 text-xs outline-none text-white"/></div><div><p className="text-[10px] text-white/40 mb-1">終了</p><input type="datetime-local" value={maintEndInput} onChange={e=>setMaintEndInput(e.target.value)} className="w-full bg-slate-900 border border-white/10 rounded-lg px-2 py-2 text-xs outline-none text-white"/></div></div>
                <input value={maintMessageInput} onChange={e=>setMaintMessageInput(e.target.value)} placeholder="生徒へのメッセージ" className="w-full bg-slate-900 border border-white/10 rounded-lg px-3 py-2 text-sm outline-none text-white placeholder-white/30"/>
                <button onClick={saveMaintenanceWindow} className="w-full bg-red-600 text-white rounded-lg px-4 py-2 text-sm hover:bg-red-500 font-bold">予約を保存</button>
                {maintMsg&&<p className="text-xs text-emerald-400">{maintMsg}</p>}
              </div>
              <div className="bg-slate-800/60 border border-white/10 rounded-xl p-4 space-y-3">
                <SectionLabel color="indigo">お知らせの投稿</SectionLabel>
                <input value={announceTitleInput} onChange={e=>setAnnounceTitleInput(e.target.value)} placeholder="タイトル" className="w-full bg-slate-900 border border-white/10 rounded-lg px-3 py-2 text-sm outline-none text-white placeholder-white/30"/>
                <textarea value={announceBodyInput} onChange={e=>setAnnounceBodyInput(e.target.value)} placeholder="本文" rows={3} className="w-full bg-slate-900 border border-white/10 rounded-lg px-3 py-2 text-sm outline-none text-white placeholder-white/30 resize-none"/>
                <button onClick={postAnnouncement} className="w-full bg-indigo-600 text-white rounded-lg px-4 py-2 text-sm hover:bg-indigo-500 font-bold">投稿する</button>
                {announceMsg&&<p className="text-xs text-emerald-400">{announceMsg}</p>}
                {announcements.length>0&&<div className="max-h-40 overflow-y-auto border border-white/10 rounded-lg divide-y divide-white/5 bg-slate-900">{announcements.slice().reverse().map(a=><div key={a.id} className="flex items-center justify-between px-3 py-2"><div className="min-w-0"><p className="font-bold text-white truncate text-sm">{a.title}</p><p className="text-[10px] text-white/30">{new Date(a.date).toLocaleDateString('ja-JP')}</p></div><button onClick={()=>deleteAnnouncement(a.id)} className="text-white/30 hover:text-red-400 flex-shrink-0"><Trash2 className="w-4 h-4"/></button></div>)}</div>}
              </div>
              <div className="bg-slate-800/60 border border-white/10 rounded-xl p-4 space-y-2">
                <SectionLabel color="fuchsia">プレイ用の合言葉</SectionLabel>
                <p className="text-xs text-white/30">現在: <span className="font-mono font-bold text-white">{playPassword}</span></p>
                <div className="flex gap-2"><input value={playPasswordAdminInput} onChange={e=>setPlayPasswordAdminInput(e.target.value)} placeholder="新しい合言葉" className="flex-1 bg-slate-900 border border-white/10 rounded-lg px-3 py-2 text-sm outline-none text-white placeholder-white/30"/><button onClick={savePlayPassword} className="bg-fuchsia-600 text-white rounded-lg px-4 py-2 text-sm hover:bg-fuchsia-500 font-bold">保存</button></div>
                {playPasswordSaveMsg&&<p className="text-xs text-emerald-400">{playPasswordSaveMsg}</p>}
              </div>
              <div className="bg-fuchsia-950/30 border border-fuchsia-500/30 rounded-xl p-4 space-y-3">
                <SectionLabel color="fuchsia">QAアカウントの発行</SectionLabel>
                <p className="text-[11px] text-white/50">称号・リワード・ランクバッジをすべて選択確認できる検証用アカウントを1件発行します。</p>
                <button onClick={issueQaId} className="w-full bg-fuchsia-600 text-white rounded-lg px-4 py-2 text-sm hover:bg-fuchsia-500 font-bold flex items-center justify-center gap-1"><ShieldCheck className="w-4 h-4"/>QA用IDを発行</button>
                {studentIdMsg&&<p className="text-xs text-emerald-400">{studentIdMsg}</p>}
              </div>
              <div className="bg-emerald-950/30 border border-emerald-500/30 rounded-xl p-4 space-y-3">
                <SectionLabel color="emerald">バックアップと復元</SectionLabel>
                <p className="text-[11px] text-white/50">すべての生徒データ・ランキング・設定を1つのファイルに保存できます。</p>
                <button onClick={exportBackup} className="w-full bg-emerald-600 text-white rounded-lg px-4 py-2 text-sm hover:bg-emerald-500 font-bold flex items-center justify-center gap-1"><Download className="w-4 h-4"/>バックアップを保存</button>
                {backupStatus&&<p className="text-xs text-emerald-400">{backupStatus}</p>}
                <div className="border-t border-white/10 pt-3 space-y-2">
                  <p className="text-xs font-bold text-white">バックアップから復元</p>
                  <input type="file" accept=".json" onChange={handleRestoreFileSelect} className="text-sm w-full text-white/70"/>
                  {pendingRestoreFile&&(
                    <div className="bg-red-950/40 border border-red-500/30 rounded-lg p-3 space-y-2">
                      <p className="text-xs text-red-300">「{pendingRestoreFile.name}」を復元しますか？現在のデータはすべて上書きされます。</p>
                      <div className="flex gap-2">
                        <button onClick={confirmRestore} className="flex-1 text-xs bg-red-500 text-white rounded-lg px-3 py-2 font-bold hover:bg-red-600">復元を実行</button>
                        <button onClick={cancelRestore} className="flex-1 text-xs bg-slate-700 text-white rounded-lg px-3 py-2 hover:bg-slate-600">キャンセル</button>
                      </div>
                    </div>
                  )}
                  {restoreStatus&&<p className="text-xs text-emerald-400">{restoreStatus}</p>}
                </div>
              </div>
              <div className="bg-slate-800/60 border border-white/10 rounded-xl p-4 space-y-3">
                <SectionLabel color="cyan">生徒IDの発行</SectionLabel>
                <div className="flex gap-2">
                  <select value={issueYear} onChange={e=>setIssueYear(parseInt(e.target.value,10))} className="flex-1 bg-slate-900 border border-white/10 rounded-lg px-3 py-2 text-sm outline-none text-white">{getCurrentYearOptions().map(y=><option key={y} value={y}>{y}年度</option>)}</select>
                  <input type="number" min={1} max={200} value={issueCount} onChange={e=>setIssueCount(e.target.value)} className="w-24 bg-slate-900 border border-white/10 rounded-lg px-3 py-2 text-sm outline-none text-white"/>
                  <button onClick={issueStudentIds} className="bg-cyan-600 text-white rounded-lg px-4 py-2 text-sm hover:bg-cyan-500 flex items-center gap-1 font-bold whitespace-nowrap"><Plus className="w-4 h-4"/>発行</button>
                </div>
                {lastIssuedIds.length>0&&<div className="bg-slate-900 border border-cyan-500/30 rounded-lg p-3"><p className="text-xs font-bold text-cyan-300 mb-1">今回発行したID</p><div className="max-h-32 overflow-y-auto font-mono text-xs text-white/70 grid grid-cols-2 gap-1">{lastIssuedIds.map(e=><span key={e.id}>{e.id}{e.isQA?' (QA)':''}</span>)}</div></div>}
              </div>
              <div className="bg-slate-800/60 border border-white/10 rounded-xl p-4 space-y-3">
                <div className="flex items-center justify-between"><SectionLabel color="purple">生徒一覧</SectionLabel><select value={adminYearFilter} onChange={e=>setAdminYearFilter(e.target.value)} className="bg-slate-900 border border-white/10 rounded-lg px-2 py-1 text-xs outline-none text-white"><option value="all">すべての年度</option>{[...new Set(allStudentIds.map(s=>s.enrollYear).filter(Boolean))].sort((a,b)=>b-a).map(y=><option key={y} value={y}>{y}年度</option>)}</select></div>
                {adminYearFilter!=='all'&&(deleteYearTarget===parseInt(adminYearFilter,10)?<div className="flex items-center gap-2 bg-red-950/40 border border-red-500/30 rounded-lg p-2"><span className="text-xs text-red-300 flex-1">{adminYearFilter}年度の生徒を全員削除しますか？</span><button onClick={confirmDeleteYear} className="text-xs bg-red-500 text-white rounded-lg px-2 py-1">削除する</button><button onClick={()=>setDeleteYearTarget(null)} className="text-xs bg-slate-700 text-white rounded-lg px-2 py-1">キャンセル</button></div>:<button onClick={()=>setDeleteYearTarget(parseInt(adminYearFilter,10))} className="text-xs bg-red-600/80 text-white rounded-lg px-3 py-2 w-full font-bold hover:bg-red-600">{adminYearFilter}年度の生徒を一括削除</button>)}
                <div className="max-h-48 overflow-y-auto border border-white/10 rounded-lg divide-y divide-white/5 bg-slate-900">
                  {allStudentIds.length===0&&<p className="text-xs text-white/30 p-3 text-center">登録されているIDはありません</p>}
                  {allStudentIds.filter(s=>adminYearFilter==='all'||s.enrollYear===parseInt(adminYearFilter,10)).map(s=>(
                    <div key={s.id} className="flex items-center justify-between px-3 py-2 text-sm">
                      <div className="flex items-center gap-1.5"><span className="font-mono text-white">{s.id}</span>{s.isQA&&<QABadge/>}<span className="text-xs text-white/30 ml-1">{s.enrollYear?`${s.enrollYear}年度`:'未設定'}</span></div>
                      {deleteTarget===s.id?<div className="flex items-center gap-2"><span className="text-xs text-red-400">削除？</span><button onClick={confirmDeleteStudent} className="text-xs bg-red-500 text-white rounded-lg px-2 py-1">削除</button><button onClick={()=>setDeleteTarget(null)} className="text-xs bg-slate-700 text-white rounded-lg px-2 py-1">ｷｬﾝｾﾙ</button></div>:<button onClick={()=>setDeleteTarget(s.id)} className="text-white/30 hover:text-red-400"><Trash2 className="w-4 h-4"/></button>}
                    </div>
                  ))}
                </div>
              </div>
              <div className="space-y-1"><SectionLabel color="emerald">単語編集</SectionLabel><div className="grid grid-cols-4 gap-1">{LEVELS.map(lv=><button key={lv.key} onClick={()=>{setAdminLevel(lv.key);setUploadStatus('');}} className={`text-sm font-bold py-2 rounded-lg ${adminLevel===lv.key?'bg-fuchsia-500 text-white':'bg-slate-800 text-white/40'}`}>{lv.key}</button>)}</div></div>
              <div className="bg-slate-800/60 border border-white/10 rounded-xl p-4 space-y-3">
                <p className="font-bold text-white flex items-center gap-1"><Upload className="w-4 h-4"/>Excelから一括読み込み</p>
                <p className="text-xs text-white/40">A列=英単語、B列=日本語、C列=レベル（中1/中2/中3/卒業）</p>
                <input type="file" accept=".xlsx,.xls" onChange={handleFileUpload} className="text-sm w-full text-white/70"/>
                {uploadStatus&&<p className="text-sm text-fuchsia-300">{uploadStatus}</p>}
              </div>
              <div className="bg-slate-800/60 border border-white/10 rounded-xl p-4 space-y-3">
                <p className="font-bold text-white flex items-center gap-1"><Plus className="w-4 h-4"/>{adminLevel}に単語を追加</p>
                <div className="flex flex-col sm:flex-row gap-2"><input value={manualEnglish} onChange={e=>setManualEnglish(e.target.value)} placeholder="英単語" className="flex-1 bg-slate-900 border border-white/10 rounded-lg px-3 py-2 text-sm outline-none text-white placeholder-white/30"/><input value={manualJapanese} onChange={e=>setManualJapanese(e.target.value)} placeholder="日本語の意味" className="flex-1 bg-slate-900 border border-white/10 rounded-lg px-3 py-2 text-sm outline-none text-white placeholder-white/30"/><button onClick={addManualWord} className="bg-emerald-600 text-white rounded-lg px-4 py-2 hover:bg-emerald-500 font-bold">追加</button></div>
              </div>
              <div className="space-y-2">
                <div className="flex items-center justify-between"><p className="font-bold text-white">{adminLevel}の単語一覧（{adminWords.length}語）</p><button onClick={resetWordsForLevel} className="text-xs text-white/30 hover:text-red-400 flex items-center gap-1"><RotateCcw className="w-3 h-3"/>デフォルトに戻す</button></div>
                <div className="max-h-64 overflow-y-auto border border-white/10 rounded-lg divide-y divide-white/5">{adminWords.map((w,i)=><div key={`${w.english}-${i}`} className="flex items-center gap-2 px-3 py-2 text-sm"><span className="font-medium text-white flex-1 truncate">{w.english}</span><span className="text-white/40 flex-1 text-right truncate">{w.japanese}</span><button onClick={()=>deleteWord(w)} className="text-white/30 hover:text-red-400 flex-shrink-0"><Trash2 className="w-4 h-4"/></button></div>)}</div>
              </div>
              <div className="bg-red-950/30 border border-red-500/20 rounded-xl p-4 space-y-2">
                <p className="font-bold text-white">{adminLevel}のランキング管理</p>
                <p className="text-xs text-white/40">マンスリー: {adminRanking.monthly.length}件　歴代: {adminRanking.allTime.length}件</p>
                <div className="flex gap-2"><button onClick={()=>clearMonthly(adminLevel)} className="flex-1 bg-red-600/80 text-white text-sm rounded-lg px-3 py-2 hover:bg-red-600 font-bold">マンスリーをリセット</button><button onClick={()=>clearAllTime(adminLevel)} className="flex-1 bg-red-600/80 text-white text-sm rounded-lg px-3 py-2 hover:bg-red-600 font-bold">歴代をリセット</button></div>
              </div>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}
