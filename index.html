<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOCAB RUSH</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; img-src 'self' data: https:; font-src 'self' https:; connect-src 'self' https:;">
<script src="https://cdn.tailwindcss.com"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBVr-eOfbZ7VyS1BNdMWcgxFy5cA5G8Iqc",
    authDomain: "vocab-rush-e19d8.firebaseapp.com",
    projectId: "vocab-rush-e19d8",
    storageBucket: "vocab-rush-e19d8.firebasestorage.app",
    messagingSenderId: "313243244560",
    appId: "1:313243244560:web:3a63dba214a2435965d295"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  signInAnonymously(auth).catch(e => console.error("Auth error:", e));

  window.vocabApp = {
    db, auth,
    async get(key, shared = false) {
      try {
        const col = shared ? "shared" : "personal";
        const ref = doc(db, col, key.replace(/[:/]/g, "_"));
        const snap = await getDoc(ref);
        return snap.exists() ? JSON.parse(snap.data().value) : null;
      } catch (e) { console.error("get error:", e); return null; }
    },
    async set(key, value, shared = false) {
      try {
        const col = shared ? "shared" : "personal";
        const ref = doc(db, col, key.replace(/[:/]/g, "_"));
        await setDoc(ref, { value: JSON.stringify(value) });
      } catch (e) { console.error("set error:", e); }
    }
  };
  
  window.firebaseReady = true;
</script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; padding: 0; background: #050308; color: white; font-family: system-ui, -apple-system, sans-serif; }
  .btn { padding: 12px 24px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: linear-gradient(135deg, #d946ef, #8b5cf6); color: white; }
  .btn-primary:hover { transform: scale(1.05); }
  .btn-dark { background: #1e293b; color: white; border: 1px solid #64748b; }
  .btn-dark:hover { background: #334155; }
  .container { max-width: 600px; margin: 0 auto; padding: 20px; }
  .card { background: #1e1b4b; border: 1px solid #ffffff20; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
  .title { font-size: 32px; font-weight: 900; text-align: center; margin: 20px 0; }
  input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #0f172a; border: 1px solid #64748b; border-radius: 6px; color: white; font-family: inherit; }
  input:focus, select:focus { outline: none; border-color: #d946ef; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
  .badge { display: inline-block; background: #8b5cf6; padding: 6px 12px; border-radius: 20px; font-size: 12px; margin: 5px; }
  .hidden { display: none; }
  .ranking-item { background: #0f172a; padding: 12px; border-radius: 6px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; }
  .ranking-item .rank { font-weight: 900; color: #fbbf24; min-width: 30px; }
  .ranking-item .score { color: #22d3ee; font-weight: bold; }
</style>
</head>
<body>

<div class="container" id="app">
  <div class="title">VOCAB <span style="color: #d946ef;">RUSH</span></div>
  
  <!-- HOME -->
  <div id="home" class="card">
    <h2 style="text-align: center; margin-top: 0;">ホーム</h2>
    <button class="btn btn-primary" style="width: 100%; margin: 10px 0;" onclick="app.goPlayPasswordGate()">バトル開始</button>
    <button class="btn btn-dark" style="width: 100%; margin: 10px 0;" onclick="app.goRanking()">ランキング</button>
    <button class="btn btn-dark" style="width: 100%; margin: 10px 0;" onclick="app.goAdminLogin()">管理者</button>
  </div>

  <!-- PLAY PASSWORD -->
  <div id="playPasswordGate" class="card hidden">
    <h2>合言葉を入力</h2>
    <input type="password" id="playPasswordInput" placeholder="合言葉">
    <button class="btn btn-primary" style="width: 100%;" onclick="app.checkPlayPassword()">決定</button>
    <button class="btn btn-dark" style="width: 100%;" onclick="app.goHome()">戻る</button>
    <p id="playPasswordError" style="color: #ef4444; text-align: center;"></p>
  </div>

  <!-- STUDENT ID -->
  <div id="studentIdGate" class="card hidden">
    <h2>生徒IDを入力</h2>
    <input type="text" id="studentIdInput" placeholder="例: A3F7K9P2" style="text-transform: uppercase;">
    <button class="btn btn-primary" style="width: 100%;" onclick="app.checkStudentId()">決定</button>
    <button class="btn btn-dark" style="width: 100%;" onclick="app.goHome()">戻る</button>
    <p id="studentIdError" style="color: #ef4444; text-align: center;"></p>
  </div>

  <!-- LEVEL SELECT -->
  <div id="levelSelect" class="card hidden">
    <h2>レベルを選択</h2>
    <div style="display: grid; grid-template-columns: 1fr; gap: 12px;">
      <button class="btn btn-primary" style="width: 100%; text-align: left;" onclick="app.startGame('中1')">中学1年 - 基礎レベル</button>
      <button class="btn btn-primary" style="width: 100%; text-align: left;" onclick="app.startGame('中2')">中学2年 - 標準レベル</button>
      <button class="btn btn-primary" style="width: 100%; text-align: left;" onclick="app.startGame('中3')">中学3年 - 応用レベル</button>
      <button class="btn btn-primary" style="width: 100%; text-align: left;" onclick="app.startGame('卒業')">卒業レベル - 総合・入試レベル</button>
    </div>
    <button class="btn btn-dark" style="width: 100%; margin-top: 20px;" onclick="app.goHome()">戻る</button>
  </div>

  <!-- GAME -->
  <div id="game" class="card hidden">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <div style="font-size: 20px; font-weight: bold; color: #22d3ee;">時間: <span id="timeLeft">60</span>s</div>
      <div style="font-size: 20px; font-weight: bold; color: #fbbf24;">スコア: <span id="score">0</span></div>
    </div>
    <div style="text-align: center; background: #0f172a; padding: 30px; border-radius: 8px; margin: 20px 0;">
      <p style="font-size: 12px; color: #94a3b8; margin: 0;">問題</p>
      <p id="japanese" style="font-size: 40px; font-weight: 900; margin: 10px 0; color: white;"></p>
    </div>
    <input type="text" id="answer" placeholder="英単語を入力" style="font-size: 18px; padding: 15px;">
    <button class="btn btn-primary" style="width: 100%;" onclick="app.submitAnswer()">決定</button>
    <p id="gameFeedback" style="text-align: center; font-size: 14px; min-height: 20px;"></p>
    <button class="btn btn-dark" style="width: 100%; margin-top: 20px;" onclick="app.abandonGame()">ゲームを終了</button>
  </div>

  <!-- RESULT -->
  <div id="result" class="card hidden">
    <h2 style="text-align: center;">ゲーム結果</h2>
    <div style="text-align: center; background: #0f172a; padding: 20px; border-radius: 8px; margin: 20px 0;">
      <p style="font-size: 12px; color: #94a3b8;">スコア</p>
      <p id="finalScore" style="font-size: 48px; font-weight: 900; color: #22d3ee; margin: 0;"></p>
    </div>
    <div class="grid">
      <div style="text-align: center;"><p style="color: #94a3b8; font-size: 12px;">正解数</p><p id="correctCount" style="font-size: 24px; font-weight: bold;"></p></div>
      <div style="text-align: center;"><p style="color: #94a3b8; font-size: 12px;">正答率</p><p id="accuracy" style="font-size: 24px; font-weight: bold;"></p></div>
    </div>
    <button class="btn btn-primary" style="width: 100%; margin: 10px 0;" onclick="app.goLevelSelect()">別のレベルをプレイ</button>
    <button class="btn btn-dark" style="width: 100%;" onclick="app.goHome()">ホームへ</button>
  </div>

  <!-- RANKING -->
  <div id="ranking" class="card hidden">
    <h2>ランキング</h2>
    <select id="rankingLevel" onchange="app.loadRanking()" style="margin: 10px 0;">
      <option value="中1">中1</option>
      <option value="中2">中2</option>
      <option value="中3">中3</option>
      <option value="卒業">卒業</option>
    </select>
    <div id="rankingList"></div>
    <button class="btn btn-dark" style="width: 100%; margin-top: 20px;" onclick="app.goHome()">戻る</button>
  </div>

  <!-- ADMIN LOGIN -->
  <div id="adminLogin" class="card hidden">
    <h2>管理者ログイン</h2>
    <input type="password" id="adminPasswordInput" placeholder="パスワード">
    <button class="btn btn-primary" style="width: 100%;" onclick="app.checkAdminPassword()">ログイン</button>
    <button class="btn btn-dark" style="width: 100%;" onclick="app.goHome()">戻る</button>
    <p id="adminError" style="color: #ef4444; text-align: center;"></p>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" class="card hidden">
    <h2>管理者パネル</h2>
    
    <h3>単語管理</h3>
    <select id="adminLevel" style="margin: 10px 0;">
      <option value="中1">中1</option>
      <option value="中2">中2</option>
      <option value="中3">中3</option>
      <option value="卒業">卒業</option>
    </select>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0;">
      <input type="text" id="manualEnglish" placeholder="英単語">
      <input type="text" id="manualJapanese" placeholder="日本語">
    </div>
    <button class="btn btn-primary" style="width: 100%; margin: 10px 0;" onclick="app.addWord()">単語を追加</button>
    <div id="wordList" style="max-height: 200px; overflow-y: auto; border: 1px solid #64748b; border-radius: 6px; padding: 10px;"></div>

    <h3 style="margin-top: 30px;">生徒ID管理</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0;">
      <select id="issueYear" style="margin: 0;">
        <option value="2024">2024年度</option>
        <option value="2025">2025年度</option>
        <option value="2026">2026年度</option>
      </select>
      <input type="number" id="issueCount" value="5" min="1" max="100" placeholder="発行数">
    </div>
    <button class="btn btn-primary" style="width: 100%; margin: 10px 0;" onclick="app.issueStudentIds()">IDを発行</button>
    <div id="issuedIds" style="background: #0f172a; padding: 10px; border-radius: 6px; max-height: 150px; overflow-y: auto;"></div>

    <h3 style="margin-top: 30px;">プレイ用合言葉</h3>
    <input type="text" id="playPasswordAdmin" placeholder="新しい合言葉">
    <button class="btn btn-primary" style="width: 100%; margin: 10px 0;" onclick="app.savePlayPassword()">保存</button>

    <button class="btn btn-dark" style="width: 100%; margin-top: 30px;" onclick="app.goHome()">ホームへ</button>
  </div>
</div>

<script>
const DEFAULT_WORDS = [
  {english:'apple',japanese:'りんご',level:'中1'},{english:'dog',japanese:'犬',level:'中1'},
  {english:'cat',japanese:'猫',level:'中1'},{english:'book',japanese:'本',level:'中1'},
  {english:'school',japanese:'学校',level:'中1'},{english:'friend',japanese:'友達',level:'中1'},
  {english:'family',japanese:'家族',level:'中1'},{english:'teacher',japanese:'先生',level:'中1'},
  {english:'student',japanese:'生徒',level:'中1'},{english:'music',japanese:'音楽',level:'中1'},
  {english:'morning',japanese:'朝',level:'中1'},{english:'night',japanese:'夜',level:'中1'},
  {english:'big',japanese:'大きい',level:'中1'},{english:'small',japanese:'小さい',level:'中1'},
  {english:'new',japanese:'新しい',level:'中1'},{english:'old',japanese:'古い',level:'中1'},
  {english:'like',japanese:'好きである',level:'中1'},{english:'play',japanese:'遊ぶ',level:'中1'},
  {english:'study',japanese:'勉強する',level:'中1'},{english:'eat',japanese:'食べる',level:'中1'},
  {english:'weather',japanese:'天気',level:'中2'},{english:'yesterday',japanese:'昨日',level:'中2'},
  {english:'tomorrow',japanese:'明日',level:'中2'},{english:'because',japanese:'なぜなら',level:'中2'},
  {english:'important',japanese:'重要な',level:'中2'},{english:'difficult',japanese:'難しい',level:'中2'},
  {english:'interesting',japanese:'面白い',level:'中2'},{english:'beautiful',japanese:'美しい',level:'中2'},
  {english:'happy',japanese:'幸せな',level:'中2'},{english:'famous',japanese:'有名な',level:'中2'},
  {english:'example',japanese:'例',level:'中3'},{english:'question',japanese:'質問',level:'中3'},
  {english:'practice',japanese:'練習する',level:'中3'},{english:'remember',japanese:'覚える',level:'中3'},
  {english:'understand',japanese:'理解する',level:'中3'},{english:'technology',japanese:'技術',level:'中3'},
  {english:'education',japanese:'教育',level:'卒業'},{english:'achievement',japanese:'達成',level:'卒業'},
  {english:'environment',japanese:'環境',level:'卒業'},{english:'communication',japanese:'コミュニケーション',level:'卒業'}
];

const ADMIN_PASSWORD = 'sensei123';
const DEFAULT_PLAY_PASSWORD = 'eigo123';

let app = {
  db: null,
  currentScreen: 'home',
  playPasswordVerified: false,
  studentId: null,
  currentLevel: null,
  gameState: null,
  allWords: DEFAULT_WORDS,
  playPassword: DEFAULT_PLAY_PASSWORD,
  allStudentIds: [],
  rankings: {},

  async init() {
    await this.loadData();
    this.showScreen('home');
  },

  async loadData() {
    const words = await window.vocabApp.get('vocab-words', true);
    if (words) this.allWords = words;
    
    const pw = await window.vocabApp.get('play-password', true);
    if (pw) this.playPassword = pw;
    
    const ids = await window.vocabApp.get('student-ids', true);
    if (ids) this.allStudentIds = ids;
    
    const ranks = await window.vocabApp.get('rankings', true);
    if (ranks) this.rankings = ranks;
  },

  showScreen(name) {
    document.querySelectorAll('[id]').forEach(el => {
      if (el.id !== 'app' && el.classList) el.classList.add('hidden');
    });
    const screen = document.getElementById(name);
    if (screen) screen.classList.remove('hidden');
    this.currentScreen = name;
  },

  goHome() { this.showScreen('home'); },
  goPlayPasswordGate() { this.showScreen('playPasswordGate'); document.getElementById('playPasswordInput').focus(); },
  goStudentIdGate() { this.showScreen('studentIdGate'); document.getElementById('studentIdInput').focus(); },
  goLevelSelect() { this.showScreen('levelSelect'); },
  goRanking() { this.loadRanking(); this.showScreen('ranking'); },
  goAdminLogin() { this.showScreen('adminLogin'); document.getElementById('adminPasswordInput').focus(); },
  goAdminPanel() { this.updateWordList(); this.showScreen('adminPanel'); },

  checkPlayPassword() {
    const input = document.getElementById('playPasswordInput').value;
    if (input === this.playPassword) {
      this.playPasswordVerified = true;
      document.getElementById('playPasswordInput').value = '';
      document.getElementById('playPasswordError').textContent = '';
      this.goStudentIdGate();
    } else {
      document.getElementById('playPasswordError').textContent = '合言葉が正しくありません';
    }
  },

  checkStudentId() {
    const input = document.getElementById('studentIdInput').value.toUpperCase();
    if (!this.allStudentIds.includes(input)) {
      document.getElementById('studentIdError').textContent = 'そのIDは登録されていません';
      return;
    }
    this.studentId = input;
    document.getElementById('studentIdInput').value = '';
    document.getElementById('studentIdError').textContent = '';
    this.goLevelSelect();
  },

  startGame(level) {
    this.currentLevel = level;
    const pool = this.allWords.filter(w => w.level === level);
    this.gameState = {
      pool: pool.sort(() => Math.random() - 0.5),
      index: 0,
      score: 0,
      correct: 0,
      attempted: 0,
      timeLeft: 60,
      startTime: Date.now()
    };
    document.getElementById('answer').value = '';
    document.getElementById('gameFeedback').textContent = '';
    this.gameLoop();
    this.showScreen('game');
    document.getElementById('answer').focus();
  },

  gameLoop() {
    if (!this.gameState) return;
    if (this.gameState.timeLeft <= 0) {
      this.endGame();
      return;
    }
    const elapsed = Math.floor((Date.now() - this.gameState.startTime) / 1000);
    this.gameState.timeLeft = 60 - elapsed;
    document.getElementById('timeLeft').textContent = this.gameState.timeLeft;
    if (this.gameState.index < this.gameState.pool.length) {
      const word = this.gameState.pool[this.gameState.index];
      document.getElementById('japanese').textContent = word.japanese;
    }
    setTimeout(() => this.gameLoop(), 100);
  },

  submitAnswer() {
    if (!this.gameState || this.gameState.index >= this.gameState.pool.length) return;
    const input = document.getElementById('answer').value.trim().toLowerCase();
    const word = this.gameState.pool[this.gameState.index];
    this.gameState.attempted += 1;
    if (input === word.english.toLowerCase()) {
      this.gameState.score += 10;
      this.gameState.correct += 1;
      document.getElementById('gameFeedback').textContent = '✓ 正解！';
      document.getElementById('gameFeedback').style.color = '#10b981';
    } else {
      document.getElementById('gameFeedback').textContent = '✗ 不正解 → ' + word.english;
      document.getElementById('gameFeedback').style.color = '#ef4444';
    }
    document.getElementById('score').textContent = this.gameState.score;
    document.getElementById('answer').value = '';
    this.gameState.index += 1;
    setTimeout(() => { document.getElementById('answer').focus(); }, 500);
  },

  async endGame() {
    this.gameState.timeLeft = 0;
    const correct = this.gameState.correct;
    const attempted = this.gameState.attempted;
    const accuracy = attempted > 0 ? Math.round(correct / attempted * 100) : 0;
    document.getElementById('finalScore').textContent = this.gameState.score;
    document.getElementById('correctCount').textContent = correct + ' / ' + attempted;
    document.getElementById('accuracy').textContent = accuracy + '%';

    // ランキングに保存
    if (!this.rankings[this.currentLevel]) this.rankings[this.currentLevel] = [];
    this.rankings[this.currentLevel].push({
      studentId: this.studentId,
      score: this.gameState.score,
      correct: correct,
      attempted: attempted,
      accuracy: accuracy,
      date: new Date().toISOString()
    });
    this.rankings[this.currentLevel].sort((a, b) => b.score - a.score);
    this.rankings[this.currentLevel] = this.rankings[this.currentLevel].slice(0, 20);
    await window.vocabApp.set('rankings', this.rankings, true);

    this.gameState = null;
    this.showScreen('result');
  },

  abandonGame() {
    this.gameState = null;
    this.goHome();
  },

  async loadRanking() {
    const level = document.getElementById('rankingLevel').value;
    const rankings = this.rankings[level] || [];
    let html = '';
    if (rankings.length === 0) {
      html = '<p style="text-align: center; color: #94a3b8;">まだランキングはありません</p>';
    } else {
      rankings.forEach((entry, i) => {
        html += `
          <div class="ranking-item">
            <span class="rank">#${i + 1}</span>
            <div style="flex: 1;">
              <div style="font-weight: bold;">${entry.studentId}</div>
              <div style="font-size: 12px; color: #94a3b8;">${entry.accuracy}% 正答</div>
            </div>
            <span class="score">${entry.score}</span>
          </div>
        `;
      });
    }
    document.getElementById('rankingList').innerHTML = html;
  },

  checkAdminPassword() {
    const input = document.getElementById('adminPasswordInput').value;
    if (input === ADMIN_PASSWORD) {
      document.getElementById('adminPasswordInput').value = '';
      document.getElementById('adminError').textContent = '';
      this.goAdminPanel();
    } else {
      document.getElementById('adminError').textContent = 'パスワードが正しくありません';
    }
  },

  addWord() {
    const eng = document.getElementById('manualEnglish').value.trim();
    const jpn = document.getElementById('manualJapanese').value.trim();
    const level = document.getElementById('adminLevel').value;
    if (!eng || !jpn) return;
    this.allWords.push({english: eng, japanese: jpn, level: level});
    window.vocabApp.set('vocab-words', this.allWords, true);
    document.getElementById('manualEnglish').value = '';
    document.getElementById('manualJapanese').value = '';
    this.updateWordList();
  },

  updateWordList() {
    const level = document.getElementById('adminLevel').value;
    const words = this.allWords.filter(w => w.level === level);
    let html = '';
    words.forEach((w, i) => {
      html += `<div style="padding: 6px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between;"><span>${w.english} - ${w.japanese}</span><button class="btn btn-dark" style="padding: 4px 8px; font-size: 12px;" onclick="app.deleteWord(${i})">削除</button></div>`;
    });
    document.getElementById('wordList').innerHTML = html;
  },

  deleteWord(index) {
    const level = document.getElementById('adminLevel').value;
    this.allWords = this.allWords.filter((w, i) => !(w.level === level && this.allWords.filter(x => x.level === level).indexOf(w) === i));
    window.vocabApp.set('vocab-words', this.allWords, true);
    this.updateWordList();
  },

  issueStudentIds() {
    const year = document.getElementById('issueYear').value;
    const count = parseInt(document.getElementById('issueCount').value) || 1;
    const ids = [];
    for (let i = 0; i < count; i++) {
      const id = 'ID' + year + Math.random().toString(36).substr(2, 8).toUpperCase();
      ids.push(id);
      this.allStudentIds.push(id);
    }
    window.vocabApp.set('student-ids', this.allStudentIds, true);
    document.getElementById('issuedIds').innerHTML = '<strong>発行したID:</strong><br>' + ids.join('<br>');
  },

  async savePlayPassword() {
    const pw = document.getElementById('playPasswordAdmin').value;
    if (!pw) return;
    this.playPassword = pw;
    await window.vocabApp.set('play-password', pw, true);
    document.getElementById('playPasswordAdmin').value = '';
    alert('保存しました');
  }
};

// 初期化
new Promise(resolve => {
  const checkReady = () => {
    if (window.firebaseReady) { app.init(); resolve(); }
    else setTimeout(checkReady, 100);
  };
  checkReady();
});
</script>

</body>
</html>
